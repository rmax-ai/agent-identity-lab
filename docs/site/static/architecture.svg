<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#grid)"/>

  <!-- Arrows: Agent → Gateway -->
  <line x1="110" y1="160" x2="250" y2="160" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Gateway → Identity API -->
  <line x1="420" y1="140" x2="530" y2="60" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Gateway → Policy Engine -->
  <line x1="420" y1="180" x2="530" y2="180" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Gateway → Token Broker -->
  <line x1="420" y1="220" x2="530" y2="300" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Gateway → Mock MCP -->
  <line x1="690" y1="160" x2="830" y2="160" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- All services → PostgreSQL -->
  <line x1="650" y1="420" x2="730" y2="500" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="440" x2="730" y2="550" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent Runtime -->
  <rect x="20" y="130" width="90" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="20" y="130" width="90" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="65" y="157" fill="#22d3ee" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">Agent</text>
  <text x="65" y="175" fill="#64748b" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle">Runtime</text>

  <!-- MCP Gateway -->
  <rect x="260" y="130" width="160" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="260" y="130" width="160" height="60" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="340" y="157" fill="#fb7185" font-size="12" font-family="JetBrains Mono,monospace" text-anchor="middle">MCP Gateway</text>
  <text x="340" y="175" fill="#64748b" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle">AuthN · AuthZ · Proxy</text>

  <!-- Identity API -->
  <rect x="530" y="30" width="170" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="530" y="30" width="170" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="615" y="57" fill="#34d399" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">Identity API</text>
  <text x="615" y="75" fill="#64748b" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle">Blueprints · Agents · Sessions</text>

  <!-- Policy Engine -->
  <rect x="530" y="150" width="170" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="530" y="150" width="170" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="615" y="177" fill="#a78bfa" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">Policy Engine</text>
  <text x="615" y="195" fill="#64748b" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle">OPA + Python Adapter</text>

  <!-- Token Broker -->
  <rect x="530" y="270" width="170" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="530" y="270" width="170" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="615" y="297" fill="#fbbf24" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">Token Broker</text>
  <text x="615" y="315" fill="#64748b" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle">OAuth · Static Secrets</text>

  <!-- Mock MCP Server -->
  <rect x="830" y="130" width="140" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="830" y="130" width="140" height="60" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="900" y="157" fill="#94a3b8" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">Mock MCP</text>
  <text x="900" y="175" fill="#64748b" font-size="8" font-family="JetBrains Mono,monospace" text-anchor="middle">Server</text>

  <!-- PostgreSQL -->
  <rect x="730" y="500" width="160" height="50" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="730" y="500" width="160" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="528" fill="#a78bfa" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">PostgreSQL</text>

  <!-- Audit Store -->
  <rect x="730" y="570" width="160" height="50" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="730" y="570" width="160" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="810" y="598" fill="#fbbf24" font-size="11" font-family="JetBrains Mono,monospace" text-anchor="middle">Audit Events</text>

  <!-- Security Boundary (MCP Gateway) -->
  <rect x="250" y="110" width="480" height="250" rx="12" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="260" y="105" fill="#fb7185" font-size="9" font-family="JetBrains Mono,monospace">Trust Boundary: MCP Gateway</text>

  <!-- Docker Compose Boundary -->
  <rect x="15" y="15" width="970" height="660" rx="16" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="8,4"/>
  <text x="25" y="40" fill="#fbbf24" font-size="10" font-family="JetBrains Mono,monospace">Docker Compose</text>

  <!-- Legend -->
  <rect x="25" y="400" width="210" height="175" rx="8" fill="rgba(15,23,42,0.9)" stroke="#1e293b" stroke-width="1"/>
  <text x="35" y="420" fill="#94a3b8" font-size="9" font-family="JetBrains Mono,monospace" font-weight="600">LEGEND</text>
  <rect x="35" y="432" width="12" height="12" rx="2" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1"/>
  <text x="55" y="443" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Frontend / Client</text>
  <rect x="35" y="452" width="12" height="12" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="55" y="463" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Backend Service</text>
  <rect x="35" y="472" width="12" height="12" rx="2" fill="rgba(76,29,149,0.6)" stroke="#a78bfa" stroke-width="1"/>
  <text x="55" y="483" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Database / Policy</text>
  <rect x="35" y="492" width="12" height="12" rx="2" fill="rgba(136,19,55,0.6)" stroke="#fb7185" stroke-width="1"/>
  <text x="55" y="503" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Security / Gateway</text>
  <rect x="35" y="512" width="12" height="12" rx="2" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="1"/>
  <text x="55" y="523" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Credential / Audit</text>
  <line x1="35" y1="537" x2="55" y2="537" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="60" y="541" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Request Flow</text>
  <line x1="35" y1="555" x2="55" y2="555" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="60" y="559" fill="#94a3b8" font-size="8" font-family="JetBrains Mono,monospace">Forward to Tool</text>
</svg>
